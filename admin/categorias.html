<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias | Portal Serra Atual</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body data-entity="categories">
  <div class="admin-shell">
    <aside class="sidebar">
      <h2>Serra Atual</h2>
      <nav aria-label="Menu administrativo">
        <a href="./dashboard.html">Dashboard</a>
        <a href="./noticias.html">Notícias</a>
        <a class="active" href="./categorias.html">Categorias</a>
        <a href="./campanhas.html">Campanhas</a>
        <a href="./anunciantes.html">Anunciantes</a>
        <a href="../index.html">Ver portal</a>
      </nav>
    </aside>
    <main class="admin-main">
      <header class="admin-header"><div><h1>Categorias</h1><p>Organize as editorias do portal.</p></div></header>
      <section class="panel" style="padding:22px">
        <form id="entityForm" class="entity-form">
          <div class="form-group"><label for="name">Nome</label><input id="name" required placeholder="Ex.: Política"></div>
          <div class="form-group"><label for="slug">Slug</label><input id="slug" required placeholder="politica"></div>
          <button class="primary-button" style="width:auto" type="submit">Adicionar categoria</button>
          <p id="entityMessage" class="form-message"></p>
        </form>
      </section>
      <section class="panel"><div class="panel-header"><h2>Categorias cadastradas</h2></div><div class="table-wrap"><table><thead><tr><th>Nome</th><th>Slug</th><th>Ações</th></tr></thead><tbody id="entityBody"><tr><td colspan="3" class="empty-state">Carregando...</td></tr></tbody></table></div></section>
    </main>
  </div>
  <script type="module" src="../assets/js/entities-admin.js"></script>
</body>
</html>
