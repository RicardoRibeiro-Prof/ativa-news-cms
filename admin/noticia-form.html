<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova notícia | Portal Serra Atual</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body data-page="news-form">
  <div class="admin-shell">
    <aside class="sidebar">
      <a class="brand" href="./dashboard.html"><span>Serra</span> Atual</a>
      <nav class="sidebar-nav">
        <a href="./dashboard.html">Dashboard</a>
        <a class="active" href="./noticias.html">Notícias</a>
        <a href="./campanhas.html">Campanhas</a>
        <a href="./anunciantes.html">Anunciantes</a>
      </nav>
      <a class="sidebar-footer" href="../index.html">Ver portal</a>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <div>
          <span class="eyebrow">Conteúdo</span>
          <h1 id="pageTitle">Nova notícia</h1>
        </div>
        <a class="button button-secondary" href="./noticias.html">Voltar</a>
      </header>

      <form id="newsForm" class="form-layout">
        <section class="panel form-main">
          <div class="field">
            <label for="title">Título</label>
            <input id="title" class="control" type="text" maxlength="180" required>
          </div>

          <div class="field">
            <label for="slug">Endereço amigável</label>
            <input id="slug" class="control" type="text" required>
          </div>

          <div class="field">
            <label for="subtitle">Subtítulo</label>
            <textarea id="subtitle" class="control" rows="3"></textarea>
          </div>

          <div class="field">
            <label for="content">Conteúdo</label>
            <textarea id="content" class="control editor-field" rows="20" required></textarea>
          </div>

          <div class="field">
            <label for="metaDescription">Descrição para Google e redes sociais</label>
            <textarea id="metaDescription" class="control" rows="3" maxlength="300"></textarea>
          </div>
        </section>

        <aside class="form-sidebar">
          <section class="panel">
            <h2>Publicação</h2>
            <div class="field">
              <label for="status">Status</label>
              <select id="status" class="control">
                <option value="draft">Rascunho</option>
                <option value="published">Publicada</option>
                <option value="scheduled">Agendada</option>
              </select>
            </div>
            <div class="field">
              <label for="publishedAt">Data de publicação</label>
              <input id="publishedAt" class="control" type="datetime-local">
            </div>
            <label class="check-row"><input id="isFeatured" type="checkbox"> Exibir como destaque</label>
            <label class="check-row"><input id="isBreaking" type="checkbox"> Marcar como urgente</label>
          </section>

          <section class="panel">
            <h2>Organização</h2>
            <div class="field">
              <label for="categoryId">Categoria</label>
              <select id="categoryId" class="control"></select>
            </div>
            <div class="field">
              <label for="authorId">Autor</label>
              <select id="authorId" class="control"></select>
            </div>
          </section>

          <section class="panel">
            <h2>Imagem de capa</h2>
            <input id="coverImage" class="control" type="file" accept="image/jpeg,image/png,image/webp">
            <input id="coverImageUrl" type="hidden">
            <img id="imagePreview" class="image-preview" alt="Prévia da imagem">
          </section>

          <button id="saveButton" class="button button-block" type="submit">Salvar notícia</button>
          <p id="formMessage" class="form-message" aria-live="polite"></p>
        </aside>
      </form>
    </main>
  </div>

  <script type="module" src="../assets/js/news-admin.js"></script>
</body>
</html>
